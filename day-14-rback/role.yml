apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: developer-role
rules:
  - apiGroups: [""]           # indicates the core API group  [""]
    resources: ["ConfigMap"]
    verbs: ["get", "list"]
  - apiGroups: [""] # 
    resources: ["pods"]
    verbs: ["get", "list",]
  - apiGroups: ["apps"]       # indicate Named API Groups ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
